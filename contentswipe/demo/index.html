<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>ContentSwipe — Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0a0a;
    --card-bg: #141414;
    --border: #222;
    --text: #e8e8e8;
    --text-dim: #777;
    --accent: #c4ff4e;
    --accent-dim: #3a4d1a;
    --reject: #ff4e4e;
    --approve: #4eff8e;
    --variant: #4ecaff;
    --ideas: #ffc14e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Instrument Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    height: 100dvh;
    width: 100vw;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ───────────────────────────── */
  header {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(20px);
    background: rgba(10,10,10,0.85);
    z-index: 100;
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: -0.5px;
    color: var(--accent);
  }

  .header-meta {
    font-size: 12px;
    color: var(--text-dim);
    font-family: 'Space Mono', monospace;
  }

  /* ── Feed Container ───────────────────── */
  .feed {
    flex: 1;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
    -webkit-overflow-scrolling: touch;
  }

  .feed::-webkit-scrollbar { display: none; }

  /* ── Card ──────────────────────────────── */
  .card {
    scroll-snap-align: start;
    height: 100%;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .card-video-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }

  .card-video-wrap video {
    height: 100%;
    max-width: 100%;
    object-fit: contain;
  }

  .play-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.3);
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
  }

  .card-video-wrap:hover .play-overlay,
  .card-video-wrap.paused .play-overlay {
    opacity: 1;
  }

  .play-icon {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .play-icon svg {
    width: 24px;
    height: 24px;
    fill: white;
    margin-left: 3px;
  }

  /* ── Card Info Bar ────────────────────── */
  .card-info {
    flex-shrink: 0;
    padding: 16px 20px;
    background: var(--card-bg);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }

  .card-text {
    flex: 1;
    min-width: 0;
  }

  .card-title {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.3;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-desc {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-status {
    flex-shrink: 0;
    padding: 4px 10px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-family: 'Space Mono', monospace;
  }

  .card-status.pending { background: var(--accent-dim); color: var(--accent); }
  .card-status.approved { background: rgba(78,255,142,0.15); color: var(--approve); }
  .card-status.rejected { background: rgba(255,78,78,0.15); color: var(--reject); }

  /* ── Swipe Actions ────────────────────── */
  .card-actions {
    flex-shrink: 0;
    display: flex;
    gap: 0;
    border-top: 1px solid var(--border);
    background: var(--card-bg);
  }

  .action-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 12px 8px;
    background: transparent;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    border-right: 1px solid var(--border);
  }

  .action-btn:last-child { border-right: none; }

  .action-btn:hover { background: rgba(255,255,255,0.04); }
  .action-btn.reject:hover { color: var(--reject); }
  .action-btn.approve:hover { color: var(--approve); }
  .action-btn.variant:hover { color: var(--variant); }
  .action-btn.ideas:hover { color: var(--ideas); }

  .action-btn.active.reject { color: var(--reject); background: rgba(255,78,78,0.08); }
  .action-btn.active.approve { color: var(--approve); background: rgba(78,255,142,0.08); }

  .action-icon {
    font-size: 18px;
    line-height: 1;
  }

  /* ── Counter / Nav ────────────────────── */
  .nav-dots {
    position: fixed;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 100;
  }

  .nav-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-dim);
    opacity: 0.3;
    transition: all 0.2s;
    cursor: pointer;
    border: none;
  }

  .nav-dot.active {
    opacity: 1;
    background: var(--accent);
    transform: scale(1.4);
  }

  /* ── Toast ────────────────────────────── */
  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(30,30,30,0.95);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    padding: 10px 20px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.19,1,0.22,1);
    pointer-events: none;
    z-index: 200;
    white-space: nowrap;
  }

  .toast.visible {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── Keyboard hint ────────────────────── */
  .kb-hint {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    z-index: 100;
    opacity: 0.4;
    transition: opacity 0.3s;
  }

  .kb-hint:hover { opacity: 0.8; }

  .kb-key {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .kb-key kbd {
    background: rgba(255,255,255,0.08);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 6px;
    font-size: 10px;
    font-family: inherit;
    color: var(--text);
  }
</style>
</head>
<body>

<header>
  <div class="logo">ContentSwipe</div>
  <div class="header-meta" id="counter">1 / —</div>
</header>

<div class="feed" id="feed"></div>

<div class="nav-dots" id="navDots"></div>

<div class="toast" id="toast"></div>

<div class="kb-hint">
  <span class="kb-key"><kbd>←</kbd> reject</span>
  <span class="kb-key"><kbd>→</kbd> approve</span>
  <span class="kb-key"><kbd>↑</kbd> variant</span>
  <span class="kb-key"><kbd>↓</kbd> ideas</span>
  <span class="kb-key"><kbd>space</kbd> play/pause</span>
</div>

<script>
const SUPABASE_URL = "https://rnqkjfrwkyupkyvygtpg.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJucWtqZnJ3a3l1cGt5dnlndHBnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMDcyMTUsImV4cCI6MjA4OTY4MzIxNX0.ghk4esUD0KhYS1Gm1K33TjeknIuXGWNzDBreD2A86Ok";

let cards = [];
let currentIndex = 0;

async function fetchCards() {
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/content_items?video_url=not.is.null&select=id,title,body_text,video_url,review_status,created_at&order=created_at.desc`,
    { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }
  );
  cards = await res.json();
  return cards;
}

function showToast(msg, color) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.color = color || "var(--text)";
  t.classList.add("visible");
  setTimeout(() => t.classList.remove("visible"), 1800);
}

function renderFeed() {
  const feed = document.getElementById("feed");
  const dots = document.getElementById("navDots");
  feed.innerHTML = "";
  dots.innerHTML = "";

  cards.forEach((card, i) => {
    // Nav dot
    const dot = document.createElement("button");
    dot.className = `nav-dot${i === 0 ? " active" : ""}`;
    dot.dataset.index = i;
    dot.onclick = () => {
      document.querySelectorAll(".card")[i]?.scrollIntoView({ behavior: "smooth" });
    };
    dots.appendChild(dot);

    // Card
    const el = document.createElement("div");
    el.className = "card";
    el.dataset.index = i;

    const statusClass = card.review_status || "pending";

    el.innerHTML = `
      <div class="card-video-wrap paused" data-i="${i}">
        <video src="${card.video_url}" preload="auto" loop playsinline></video>
        <div class="play-overlay">
          <div class="play-icon">
            <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
          </div>
        </div>
      </div>
      <div class="card-info">
        <div class="card-text">
          <div class="card-title">${card.title}</div>
          <div class="card-desc">${card.body_text || ""}</div>
        </div>
        <div class="card-status ${statusClass}">${statusClass}</div>
      </div>
      <div class="card-actions">
        <button class="action-btn reject" data-action="rejected" data-id="${card.id}">
          <span class="action-icon">←</span>Reject
        </button>
        <button class="action-btn approve" data-action="approved" data-id="${card.id}">
          <span class="action-icon">→</span>Approve
        </button>
        <button class="action-btn variant" data-action="needs_edit" data-id="${card.id}">
          <span class="action-icon">↑</span>Variant
        </button>
        <button class="action-btn ideas" data-action="ideas" data-id="${card.id}">
          <span class="action-icon">↓</span>Ideas
        </button>
      </div>
    `;

    // Play/pause on click
    const wrap = el.querySelector(".card-video-wrap");
    wrap.addEventListener("click", () => {
      const vid = wrap.querySelector("video");
      if (vid.paused) {
        vid.play();
        wrap.classList.remove("paused");
      } else {
        vid.pause();
        wrap.classList.add("paused");
      }
    });

    // Action buttons
    el.querySelectorAll(".action-btn").forEach(btn => {
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        handleAction(card.id, btn.dataset.action, i);
      });
    });

    feed.appendChild(el);
  });

  updateCounter();
}

async function handleAction(cardId, action, index) {
  if (action === "ideas") {
    showToast("↓ More ideas requested", "var(--ideas)");
    return;
  }

  const labels = {
    rejected: { text: "← Rejected", color: "var(--reject)" },
    approved: { text: "→ Approved", color: "var(--approve)" },
    needs_edit: { text: "↑ Variant requested", color: "var(--variant)" },
  };

  // Update in Supabase
  await fetch(`${SUPABASE_URL}/rest/v1/content_items?id=eq.${cardId}`, {
    method: "PATCH",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json",
      Prefer: "return=minimal",
    },
    body: JSON.stringify({ review_status: action }),
  });

  // Update local state
  cards[index].review_status = action;

  // Update UI
  const card = document.querySelectorAll(".card")[index];
  const badge = card.querySelector(".card-status");
  badge.className = `card-status ${action}`;
  badge.textContent = action;

  // Highlight active button
  card.querySelectorAll(".action-btn").forEach(b => b.classList.remove("active"));
  card.querySelector(`[data-action="${action}"]`)?.classList.add("active");

  const l = labels[action];
  if (l) showToast(l.text, l.color);

  // Auto-advance after approve/reject
  if (action === "approved" || action === "rejected") {
    setTimeout(() => {
      const next = document.querySelectorAll(".card")[index + 1];
      if (next) next.scrollIntoView({ behavior: "smooth" });
    }, 600);
  }
}

function updateCounter() {
  document.getElementById("counter").textContent = `${currentIndex + 1} / ${cards.length}`;

  document.querySelectorAll(".nav-dot").forEach((d, i) => {
    d.classList.toggle("active", i === currentIndex);
  });
}

// Scroll-snap observer to track current card + autoplay
function setupScrollObserver() {
  const observer = new IntersectionObserver(
    (entries) => {
      entries.forEach((entry) => {
        const vid = entry.target.querySelector("video");
        const wrap = entry.target.querySelector(".card-video-wrap");
        if (entry.isIntersecting) {
          currentIndex = parseInt(entry.target.dataset.index);
          updateCounter();
          vid.play().catch(() => {});
          wrap.classList.remove("paused");
        } else {
          vid.pause();
          vid.currentTime = 0;
          wrap.classList.add("paused");
        }
      });
    },
    { threshold: 0.6 }
  );

  document.querySelectorAll(".card").forEach((c) => observer.observe(c));
}

// Keyboard shortcuts
document.addEventListener("keydown", (e) => {
  const card = cards[currentIndex];
  if (!card) return;

  switch (e.key) {
    case "ArrowLeft":
      e.preventDefault();
      handleAction(card.id, "rejected", currentIndex);
      break;
    case "ArrowRight":
      e.preventDefault();
      handleAction(card.id, "approved", currentIndex);
      break;
    case "ArrowUp":
      e.preventDefault();
      handleAction(card.id, "needs_edit", currentIndex);
      break;
    case "ArrowDown":
      e.preventDefault();
      showToast("↓ More ideas requested", "var(--ideas)");
      const next = document.querySelectorAll(".card")[currentIndex + 1];
      if (next) next.scrollIntoView({ behavior: "smooth" });
      break;
    case " ":
      e.preventDefault();
      const wrap = document.querySelectorAll(".card-video-wrap")[currentIndex];
      wrap?.click();
      break;
  }
});

// Boot
(async () => {
  await fetchCards();
  renderFeed();
  setupScrollObserver();
})();
</script>
</body>
</html>
